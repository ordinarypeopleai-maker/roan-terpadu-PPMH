<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ro'an Terpadu PPMH</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #1c5c3a;
    --primary-light: #edf2ef;
    --gold: #b8860b;
    --gold-light: #fffbeb;
    --success: #0f8060;
    --destructive: #dc2626;
    --destructive-light: #fff1f1;
    --bg: #f4f8f5;
    --card: #ffffff;
    --border: #dbeadf;
    --muted: #6b7f72;
    --text: #1a1a1a;
    --radius: 10px;
  }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, #2d7a50 100%);
    color: white;
    padding: 16px 16px 20px;
    border-radius: 0 0 16px 16px;
    margin-bottom: 16px;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .header-logo { display: flex; align-items: center; gap: 12px; }
  .header-logo img { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
  .header-logo span { font-size: 18px; font-weight: 800; }
  .header-title { font-size: 10px; opacity: .85; margin-bottom: 2px; }
  .header-subtitle { font-size: 20px; font-weight: 700; }

  /* NAV */
  .nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: white; border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; padding: 8px 20px 12px;
    z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,.05);
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 10px; font-weight: 600; color: var(--muted);
    text-decoration: none; padding: 6px 16px; border-radius: 8px; cursor: pointer;
    background: none; border: none; transition: all .2s;
  }
  .nav-item.active { color: var(--primary); background: var(--primary-light); }
  .nav-item svg { width: 18px; height: 18px; }

  /* PAGES */
  .page { display: none; padding: 0 16px 110px; }
  .page.active { display: block; }

  /* PAGE HEADER */
  .page-header { margin-bottom: 16px; }
  .page-title { font-size: 18px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .page-title svg { color: var(--gold); }
  .page-subtitle { font-size: 13px; color: var(--muted); font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; }

  /* BUTTON */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; padding: 8px 12px; border-radius: var(--radius);
    font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all .2s;
  }
  .btn-outline { background: white; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--primary-light); color: var(--primary); }
  .btn-success { background: var(--success); color: white; }
  .btn-danger { background: var(--destructive); color: white; }
  .btn svg { width: 16px; height: 16px; }
  .btn-group { display: flex; flex-direction: column; gap: 8px; }

  /* COUNTDOWN */
  .countdown {
    background: linear-gradient(135deg, var(--gold) 0%, #d4a017 100%);
    color: #422a00; border-radius: 16px; padding: 16px; margin-bottom: 12px;
  }
  .countdown-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .countdown-icon { width: 36px; height: 36px; background: rgba(255,255,255,.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .countdown-title { font-size: 15px; font-weight: 700; }
  .countdown-sub { font-size: 11px; opacity: .85; margin-top: 2px; }
  .countdown-boxes { display: flex; gap: 8px; margin-bottom: 12px; }
  .countdown-box { flex: 1; background: rgba(255,255,255,.2); border-radius: 8px; padding: 10px 4px; text-align: center; }
  .countdown-val { font-size: 24px; font-weight: 800; display: block; line-height: 1; }
  .countdown-lbl { font-size: 10px; font-weight: 600; opacity: .85; text-transform: uppercase; display: block; margin-top: 2px; }
  .countdown-date { background: rgba(255,255,255,.15); border-radius: 8px; padding: 8px; text-align: center; font-size: 13px; font-weight: 600; }

  /* INFO CARDS */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .info-card { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 12px; }
  .info-card-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .info-card-val { font-size: 14px; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  .badge-jumat { background: var(--gold-light); color: var(--gold); }
  .badge-minggu { background: var(--destructive-light); color: var(--destructive); }
  .badge-biasa { background: var(--primary-light); color: var(--primary); }

  /* NEXT KUBRO */
  .next-kubro { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; margin-bottom: 12px; }
  .next-kubro-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .schedule-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px; border-radius: 8px; margin-bottom: 6px; }
  .schedule-item:first-of-type { background: var(--primary-light); border-left: 3px solid var(--primary); }
  .schedule-item:not(:first-of-type) { background: var(--bg); }
  .komplek-badge { width: 28px; height: 28px; border-radius: 50%; background: white; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: var(--primary); flex-shrink: 0; }
  .lokasi-name { font-size: 13px; font-weight: 700; }
  .lokasi-detail { font-size: 12px; color: var(--muted); line-height: 1.4; }

  /* KUBRO PAGE */
  .kubro-date { background: linear-gradient(135deg, var(--primary), #2d7a50); color: white; font-size: 13px; font-weight: 700; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .kubro-group { margin-bottom: 16px; }
  .kubro-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px; background: var(--primary-light); border-radius: 8px; border-left: 3px solid var(--primary); margin-bottom: 8px; }

  /* TPS TABLE */
  .tps-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tps-table th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); background: var(--primary-light); }
  .tps-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .tps-table tr:last-child td { border-bottom: none; }
  .tps-table tr.today td { background: rgba(28,92,58,.05); }
  .tps-table tr.jumat td { background: var(--gold-light); }
  .tps-table tr.minggu td { background: var(--destructive-light); }
  .table-wrap { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }

  /* CATATAN */
  .catatan-info { background: linear-gradient(to right, rgba(28,92,58,.05), rgba(184,134,11,.05)); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 14px; font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
  .note-card { background: white; border-radius: 8px; border: 1px solid var(--border); border-left: 3px solid var(--gold); padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .note-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .note-title { font-size: 15px; font-weight: 700; }
  .note-date { font-size: 11px; font-weight: 600; color: var(--muted); flex-shrink: 0; }
  .note-content { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 8px; }
  .note-file { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--primary-light); border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--primary); text-decoration: none; border: 1px solid var(--border); }
  .note-empty { text-align: center; padding: 40px; color: var(--muted); }
  .note-empty svg { width: 40px; height: 40px; opacity: .4; margin: 0 auto 12px; display: block; }
  .note-form { background: white; border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
  .form-group { margin-bottom: 12px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .form-input, .form-textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 14px; outline: none; transition: border-color .2s; }
  .form-input:focus, .form-textarea:focus { border-color: var(--primary); }
  .form-textarea { min-height: 90px; resize: vertical; }
  .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; background: var(--bg); transition: border-color .2s; }
  .upload-area:hover { border-color: var(--primary); }
  .upload-area svg { width: 24px; height: 24px; color: var(--primary); margin: 0 auto 8px; display: block; }
  .upload-area p { font-size: 13px; color: var(--muted); }
  .file-selected { margin-top: 8px; display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: white; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-weight: 600; }
  .file-selected svg { color: var(--success); }
  .form-actions { display: flex; gap: 10px; margin-top: 16px; }
  .form-actions .btn { flex: 1; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="header-logo">
        <img src="https://qtrypzzcjebvfcihiynt.supabase.co/storage/v1/object/public/base44-prod/public/69b50293fdba0b58d437ab54/1fa3763b8_ChatGPTImage12Mar2026141730.png" alt="Logo" onerror="this.style.display='none'" />
        <span>Ro'an</span>
      </div>
    </div>
    <div class="header-title">Selamat Datang,</div>
    <div class="header-subtitle">Sistem Ro'an PPMH</div>
  </header>

  <!-- PAGES -->
  <main>
    <!-- HOME -->
    <div id="page-home" class="page active">
      <div id="countdown-container"></div>
      <div id="info-cards-container"></div>
      <div id="next-kubro-container"></div>
    </div>

    <!-- KUBRO -->
    <div id="page-kubro" class="page">
      <div class="page-header">
        <div class="page-title">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
          Jadwal Jumat Kubro
        </div>
        <div class="page-subtitle"><span class="dot"></span><span id="kubro-period"></span></div>
      </div>
      <button class="btn btn-outline" style="margin-bottom:16px" onclick="exportKubroPDF()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
        Export PDF
      </button>
      <div id="kubro-list"></div>
    </div>

    <!-- TPS -->
    <div id="page-tps" class="page">
      <div class="page-header">
        <div class="page-title">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>
          Jadwal Ro'an TPS
        </div>
        <div class="page-subtitle"><span class="dot"></span><span id="tps-period"></span></div>
      </div>
      <button class="btn btn-outline" style="margin-bottom:16px" onclick="exportTPSPDF()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
        Export PDF
      </button>
      <div class="table-wrap">
        <table class="tps-table">
          <thead><tr><th>Tanggal</th><th>Hari</th><th>Petugas</th></tr></thead>
          <tbody id="tps-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- CATATAN -->
    <div id="page-catatan" class="page">
      <div class="page-header">
        <div class="page-title">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" /></svg>
          Catatan & Dokumen
        </div>
        <div class="page-subtitle"><span class="dot"></span>Kelola informasi penting</div>
      </div>
      <div id="note-form-wrap" style="display:none">
        <div class="note-form">
          <div class="form-group">
            <label class="form-label">Judul</label>
            <input id="note-title" class="form-input" placeholder="Masukkan judul catatan..." />
          </div>
          <div class="form-group">
            <label class="form-label">Isi Catatan</label>
            <textarea id="note-content" class="form-textarea" placeholder="Tulis detail catatan..."></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Lampiran (opsional)</label>
            <label class="upload-area" for="note-file-input">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" /></svg>
              <p>Tap untuk upload file</p>
            </label>
            <input type="file" id="note-file-input" style="display:none" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png" onchange="onFileSelected(event)" />
            <div id="file-selected-info" class="file-selected" style="display:none">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
              <span id="file-selected-name"></span>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-outline" onclick="hideNoteForm()">✕ Batal</button>
            <button class="btn btn-success" onclick="saveNote()">💾 Simpan</button>
          </div>
        </div>
      </div>
      <div id="note-form-actions" class="btn-group" style="margin-bottom:16px">
        <button class="btn btn-success" onclick="showNoteForm()">＋ Tambah Catatan</button>
        <button class="btn btn-danger" onclick="resetNotes()">🗑 Reset Semua</button>
      </div>
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="var(--gold)" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 00-1.883 2.542l.857 6a2.25 2.25 0 002.227 1.932H19.05a2.25 2.25 0 002.227-1.932l.857-6a2.25 2.25 0 00-1.883-2.542m-16.5 0V6A2.25 2.25 0 016 3.75h3.879a1.5 1.5 0 011.06.44l2.122 2.12a1.5 1.5 0 001.06.44H18A2.25 2.25 0 0120.25 9v.776" /></svg>
        Daftar Catatan
      </div>
      <div id="notes-list"></div>
    </div>
  </main>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="nav-item active" data-page="home" onclick="navigate('home', this)">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
      Beranda
    </button>
    <button class="nav-item" data-page="kubro" onclick="navigate('kubro', this)">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
      Kubro
    </button>
    <button class="nav-item" data-page="tps" onclick="navigate('tps', this)">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>
      TPS
    </button>
    <button class="nav-item" data-page="catatan" onclick="navigate('catatan', this)">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" /></svg>
      Catatan
    </button>
  </nav>
</div>

<script>
// ─── CONSTANTS ─────────────────────────────
const BULAN_NAMA = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const HARI_NAMA = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const KOMPLEK = ['A','B','C','D','E','F','G','H','I','J'];
const KOMPLEK_HARIAN = ['A','B','C','E','F','G','H','I','J'];
const LOKASI = [
  { nama: 'Lokasi 1', detail: 'Masjid Lt 1, 2 dan Depan perpustakaan' },
  { nama: 'Lokasi 2', detail: 'Jeding Masjid' },
  { nama: 'Lokasi 3', detail: 'Teras Ndalem Gus Minan sampai Halaqoh' },
  { nama: 'Lokasi 4', detail: 'Ziarah & Membersihkan Makam Klaseman' },
  { nama: 'Lokasi 5', detail: 'Depan Mifda + Komp. C' },
  { nama: 'Lokasi 6', detail: 'Madrasah Lt. 1-3, Parkiran Bawah dan Maqom' },
  { nama: 'Lokasi 7', detail: 'Jeding Santri dan Depan Laundry' },
  { nama: 'Lokasi 8', detail: 'Dapur & Jemuran' },
  { nama: 'Lokasi 9', detail: 'Parkiran depan dan samping DU, Teras DU & Jeding Tamu DU' },
  { nama: 'Lokasi 10', detail: 'Membuang sampah ke TPS & Mengepel belakang Komp. C' },
];

// ─── SCHEDULING ─────────────────────────────
function generateKubroData(bulan, tahun) {
  const data = [];
  const firstDay = new Date(tahun, bulan, 1);
  const lastDay = new Date(tahun, bulan + 1, 0);
  const baseDate = new Date(2025, 0, 1);
  let weekCount = 5;
  const d = new Date(baseDate);
  while (d < firstDay) { if (d.getDay() === 5) weekCount++; d.setDate(d.getDate() + 1); }
  let currentWeek = weekCount % 10;
  for (let day = 1; day <= lastDay.getDate(); day++) {
    const date = new Date(tahun, bulan, day);
    if (date.getDay() === 5) {
      for (let i = 0; i < 10; i++) {
        data.push({ tanggal: new Date(date), lokasi: LOKASI[i], komplek: KOMPLEK[(currentWeek + i) % 10] });
      }
      currentWeek = (currentWeek + 1) % 10;
    }
  }
  return data;
}

function generateTPSData(bulan, tahun) {
  const data = [];
  const firstDay = new Date(tahun, bulan, 1);
  const lastDay = new Date(tahun, bulan + 1, 0);
  const baseDate = new Date(2025, 0, 1);
  let harianCount = 2;
  const d = new Date(baseDate);
  while (d < firstDay) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 5) harianCount++;
    d.setDate(d.getDate() + 1);
  }
  const kubroData = generateKubroData(bulan, tahun);
  for (let day = 1; day <= lastDay.getDate(); day++) {
    const date = new Date(tahun, bulan, day);
    const dow = date.getDay();
    let petugas = '';
    if (dow === 0) {
      petugas = 'Pengurus Kebersihan';
    } else if (dow === 5) {
      const entry = kubroData.find(e =>
        e.lokasi.nama === 'Lokasi 10' &&
        e.tanggal.getDate() === date.getDate() &&
        e.tanggal.getMonth() === date.getMonth() &&
        e.tanggal.getFullYear() === date.getFullYear()
      );
      petugas = entry ? entry.komplek : '-';
    } else {
      petugas = KOMPLEK_HARIAN[harianCount % KOMPLEK_HARIAN.length];
      harianCount++;
    }
    data.push({ tanggal: date, hari: HARI_NAMA[dow], petugas, isJumat: dow === 5, isMinggu: dow === 0 });
  }
  return data;
}

function getNextFriday(date) {
  const result = new Date(date);
  result.setDate(result.getDate() + ((5 + 7 - result.getDay()) % 7));
  result.setHours(0, 0, 0, 0);
  if (result <= date) result.setDate(result.getDate() + 7);
  return result;
}

function formatTanggal(date) {
  return `${date.getDate()} ${BULAN_NAMA[date.getMonth()]} ${date.getFullYear()}`;
}

// ─── NAVIGATION ─────────────────────────────
function navigate(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  el.classList.add('active');
}

// ─── COUNTDOWN ─────────────────────────────
let countdownInterval;
function renderCountdown() {
  const now = new Date();
  const nf = getNextFriday(now);
  const diff = nf - now;
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);
  document.getElementById('countdown-container').innerHTML = `
    <div class="countdown">
      <div class="countdown-header">
        <div class="countdown-icon">🕌</div>
        <div>
          <div class="countdown-title">Jumat Kubro Terdekat</div>
          <div class="countdown-sub">Menuju jadwal kebersihan masjid</div>
        </div>
      </div>
      <div class="countdown-boxes">
        <div class="countdown-box"><span class="countdown-val">${days}</span><span class="countdown-lbl">Hari</span></div>
        <div class="countdown-box"><span class="countdown-val">${hours}</span><span class="countdown-lbl">Jam</span></div>
        <div class="countdown-box"><span class="countdown-val">${mins}</span><span class="countdown-lbl">Menit</span></div>
        <div class="countdown-box"><span class="countdown-val">${secs}</span><span class="countdown-lbl">Detik</span></div>
      </div>
      <div class="countdown-date">Jumat, ${formatTanggal(nf)}</div>
    </div>`;
}

// ─── INFO CARDS ─────────────────────────────
function renderInfoCards() {
  const now = new Date();
  const tpsData = generateTPSData(now.getMonth(), now.getFullYear());
  const today = tpsData.find(d =>
    d.tanggal.getDate() === now.getDate() &&
    d.tanggal.getMonth() === now.getMonth() &&
    d.tanggal.getFullYear() === now.getFullYear()
  );
  let badgeClass = 'badge-biasa', badgeText = 'Aktif';
  if (today && today.isMinggu) { badgeClass = 'badge-minggu'; badgeText = 'Minggu'; }
  else if (today && today.isJumat) { badgeClass = 'badge-jumat'; badgeText = 'Jumat Kubro'; }
  const period = `${BULAN_NAMA[now.getMonth()]} ${now.getFullYear()}`;
  const petugas = today ? today.petugas : '-';
  document.getElementById('info-cards-container').innerHTML = `
    <div class="info-grid">
      <div class="info-card">
        <div class="info-card-lbl">Ro'an Hari Ini</div>
        <div class="info-card-val">Komp. ${petugas}</div>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="info-card">
        <div class="info-card-lbl">Periode</div>
        <div class="info-card-val" style="font-size:12px">${period}</div>
        <span class="badge badge-biasa">Berjalan</span>
      </div>
    </div>`;
}

// ─── NEXT KUBRO ─────────────────────────────
function renderNextKubro() {
  const now = new Date();
  const nf = getNextFriday(now);
  const kubro = generateKubroData(nf.getMonth(), nf.getFullYear());
  const items = kubro.filter(e =>
    e.tanggal.getDate() === nf.getDate() &&
    e.tanggal.getMonth() === nf.getMonth() &&
    e.tanggal.getFullYear() === nf.getFullYear()
  );
  const html = items.map((item, i) => `
    <div class="schedule-item">
      <div class="komplek-badge">${item.komplek}</div>
      <div>
        <div class="lokasi-name">${item.lokasi.nama}</div>
        <div class="lokasi-detail">${item.lokasi.detail}</div>
      </div>
    </div>`).join('');
  document.getElementById('next-kubro-container').innerHTML = `
    <div class="next-kubro">
      <div class="next-kubro-title">📅 Jadwal Kubro Berikutnya — ${formatTanggal(nf)}</div>
      ${html}
    </div>`;
}

// ─── KUBRO PAGE ─────────────────────────────
function renderKubro() {
  const now = new Date();
  const bulan = now.getMonth(), tahun = now.getFullYear();
  document.getElementById('kubro-period').textContent = `Periode ${BULAN_NAMA[bulan]} ${tahun}`;
  const data = generateKubroData(bulan, tahun);
  const map = new Map();
  data.forEach(item => {
    const key = `${item.tanggal.getDate()}-${item.tanggal.getMonth()}-${item.tanggal.getFullYear()}`;
    if (!map.has(key)) map.set(key, { tanggal: item.tanggal, items: [] });
    map.get(key).items.push(item);
  });
  let html = '';
  map.forEach(group => {
    html += `<div class="kubro-group">
      <div class="kubro-date">🕌 Jumat, ${formatTanggal(group.tanggal)}</div>`;
    group.items.forEach(item => {
      html += `<div class="kubro-item">
        <div class="komplek-badge">${item.komplek}</div>
        <div><div class="lokasi-name">${item.lokasi.nama}</div><div class="lokasi-detail">${item.lokasi.detail}</div></div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('kubro-list').innerHTML = html || '<p style="text-align:center;color:var(--muted);padding:32px">Tidak ada jadwal Jumat di bulan ini</p>';
}

// ─── TPS PAGE ─────────────────────────────
function renderTPS() {
  const now = new Date();
  const bulan = now.getMonth(), tahun = now.getFullYear();
  document.getElementById('tps-period').textContent = `Periode ${BULAN_NAMA[bulan]} ${tahun}`;
  const data = generateTPSData(bulan, tahun);
  const tbody = document.getElementById('tps-tbody');
  tbody.innerHTML = data.map(item => {
    const isToday = item.tanggal.getDate() === now.getDate() && item.tanggal.getMonth() === now.getMonth();
    const cls = isToday ? 'today' : item.isJumat ? 'jumat' : item.isMinggu ? 'minggu' : '';
    return `<tr class="${cls}">
      <td>${item.tanggal.getDate()}/${item.tanggal.getMonth()+1}/${item.tanggal.getFullYear()}</td>
      <td>${item.hari}</td>
      <td><span class="badge ${item.isJumat ? 'badge-jumat' : item.isMinggu ? 'badge-minggu' : 'badge-biasa'}">${item.petugas}</span></td>
    </tr>`;
  }).join('');
}

// ─── CATATAN (localStorage) ─────────────────────────────
let notes = JSON.parse(localStorage.getItem('roan_notes') || '[]');
let selectedFile = null;

function saveNotesToStorage() {
  localStorage.setItem('roan_notes', JSON.stringify(notes));
}

function renderNotes() {
  const container = document.getElementById('notes-list');
  if (notes.length === 0) {
    container.innerHTML = `<div class="note-empty">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 012.012 1.244l.256.512a2.25 2.25 0 002.013 1.244h3.218a2.25 2.25 0 002.013-1.244l.256-.512a2.25 2.25 0 012.013-1.244h3.859m-19.5.338V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18v-4.162c0-.224-.034-.447-.1-.661L19.24 5.338a2.25 2.25 0 00-2.15-1.588H6.911a2.25 2.25 0 00-2.15 1.588L2.35 13.177a2.25 2.25 0 00-.1.661z" /></svg>
      <p style="font-size:14px">Belum ada catatan</p>
    </div>`;
    return;
  }
  container.innerHTML = notes.map((note, i) => `
    <div class="note-card">
      <div class="note-header">
        <div class="note-title">${note.title}</div>
        <div class="note-date">${note.date}</div>
      </div>
      <div class="note-content">${note.content || '<em>Tidak ada deskripsi</em>'}</div>
      ${note.fileUrl ? `<a class="note-file" href="${note.fileUrl}" download="${note.fileName}">📎 ${note.fileName}</a>` : ''}
    </div>`).join('');
}

function showNoteForm() {
  document.getElementById('note-form-wrap').style.display = 'block';
  document.getElementById('note-form-actions').style.display = 'none';
}

function hideNoteForm() {
  document.getElementById('note-form-wrap').style.display = 'none';
  document.getElementById('note-form-actions').style.display = 'flex';
  document.getElementById('note-title').value = '';
  document.getElementById('note-content').value = '';
  document.getElementById('file-selected-info').style.display = 'none';
  selectedFile = null;
}

function onFileSelected(e) {
  selectedFile = e.target.files[0] || null;
  if (selectedFile) {
    document.getElementById('file-selected-info').style.display = 'flex';
    document.getElementById('file-selected-name').textContent = selectedFile.name;
  }
}

function saveNote() {
  const title = document.getElementById('note-title').value.trim();
  if (!title) { alert('Judul tidak boleh kosong'); return; }
  const content = document.getElementById('note-content').value.trim();
  const date = new Date().toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });

  if (selectedFile) {
    const reader = new FileReader();
    reader.onload = (e) => {
      notes.unshift({ title, content, date, fileUrl: e.target.result, fileName: selectedFile.name });
      saveNotesToStorage();
      renderNotes();
      hideNoteForm();
    };
    reader.readAsDataURL(selectedFile);
  } else {
    notes.unshift({ title, content, date, fileUrl: null, fileName: null });
    saveNotesToStorage();
    renderNotes();
    hideNoteForm();
  }
}

function resetNotes() {
  if (confirm('Hapus semua catatan?')) {
    notes = [];
    saveNotesToStorage();
    renderNotes();
  }
}

// ─── EXPORT PDF ─────────────────────────────
function exportKubroPDF() {
  const now = new Date();
  const bulan = now.getMonth(), tahun = now.getFullYear();
  const data = generateKubroData(bulan, tahun);
  const period = `${BULAN_NAMA[bulan]} ${tahun}`;
  const map = new Map();
  data.forEach(item => {
    const key = `${item.tanggal.getDate()}-${item.tanggal.getMonth()}-${item.tanggal.getFullYear()}`;
    if (!map.has(key)) map.set(key, { tanggal: item.tanggal, items: [] });
    map.get(key).items.push(item);
  });
  let rows = '';
  map.forEach(group => {
    rows += `<tr><td colspan="3" style="background:#1c5c3a;color:white;font-weight:700;padding:8px 10px">🕌 Jumat, ${formatTanggal(group.tanggal)}</td></tr>`;
    group.items.forEach(item => {
      rows += `<tr><td style="padding:7px 10px;font-weight:700;text-align:center">${item.komplek}</td><td style="padding:7px 10px;font-weight:600">${item.lokasi.nama}</td><td style="padding:7px 10px;color:#555">${item.lokasi.detail}</td></tr>`;
    });
  });
  openPrintWindow(`Jadwal Jumat Kubro — ${period}`, `
    <table border="0" cellspacing="0" cellpadding="0" style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="background:#edf2ef"><th style="padding:8px 10px;text-align:left">Komp</th><th style="padding:8px 10px;text-align:left">Lokasi</th><th style="padding:8px 10px;text-align:left">Detail</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`);
}

function exportTPSPDF() {
  const now = new Date();
  const bulan = now.getMonth(), tahun = now.getFullYear();
  const data = generateTPSData(bulan, tahun);
  const period = `${BULAN_NAMA[bulan]} ${tahun}`;
  const rows = data.map(item => {
    const bg = item.isJumat ? '#fffbeb' : item.isMinggu ? '#fff1f1' : 'white';
    return `<tr style="background:${bg}"><td style="padding:7px 10px">${item.tanggal.getDate()}/${item.tanggal.getMonth()+1}/${item.tanggal.getFullYear()}</td><td style="padding:7px 10px;font-weight:${item.isJumat?'700':'400'}">${item.hari}</td><td style="padding:7px 10px;font-weight:600">${item.petugas}</td></tr>`;
  }).join('');
  openPrintWindow(`Jadwal Ro'an TPS — ${period}`, `
    <table border="0" cellspacing="0" cellpadding="0" style="width:100%;border-collapse:collapse;font-size:13px">
      <thead><tr style="background:#1c5c3a;color:white"><th style="padding:8px 10px;text-align:left">Tanggal</th><th style="padding:8px 10px;text-align:left">Hari</th><th style="padding:8px 10px;text-align:left">Petugas</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`);
}

function openPrintWindow(title, content) {
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${title}</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 32px; color: #1a1a1a; }
    h1 { color: #1c5c3a; font-size: 20px; margin-bottom: 4px; }
    p { color: #6b7f72; font-size: 12px; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    tr { border-bottom: 1px solid #dbeadf; }
    @media print { body { padding: 0; } button { display: none; } }
  </style></head><body>
  <h1>${title}</h1><p>Sistem Ro'an PPMH — Dicetak ${new Date().toLocaleDateString('id-ID')}</p>
  ${content}
  <br><button onclick="window.print()" style="padding:10px 24px;background:#1c5c3a;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">🖨️ Cetak / Simpan PDF</button>
  </body></html>`);
  win.document.close();
}

// ─── INIT ─────────────────────────────
renderCountdown();
setInterval(renderCountdown, 1000);
renderInfoCards();
renderNextKubro();
renderKubro();
renderTPS();
renderNotes();
</script>
</body>
</html>
